<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>算数挑战：轮胎交换</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f8ff; }
        #game-container { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #quiz-image { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        .options { display: flex; justify-content: center; gap: 20px; }
        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer; 
            border: none; border-radius: 8px; transition: transform 0.2s;
            color: white; font-weight: bold;
        }
        button:active { transform: scale(0.95); }
        .btn-a { background-color: #ff7f50; }
        .btn-b { background-color: #1e90ff; }
        .btn-c { background-color: #32cd32; }
        #message { margin-top: 20px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <img id="quiz-image" src="题目图片路径.jpg" alt="算数挑战">
    
    <div class="options">
        <button class="btn-a" onclick="checkAnswer('A')">A店</button>
        <button class="btn-b" onclick="checkAnswer('B')">B店</button>
        <button class="btn-c" onclick="checkAnswer('C')">C店</button>
    </div>

    <div id="message"></div>
    <button id="retry-btn" style="display:none; margin-top:20px; background-color:#666;" onclick="resetGame()">重新挑战</button>
</div>

<script>
    const quizImg = document.getElementById('quiz-image');
    const message = document.getElementById('message');
    const retryBtn = document.getElementById('retry-btn');

    // 图片路径配置（请替换为你实际的文件名）
    const images = {
        question: "题目图片路径.jpg",
        correct: "正确结果图片路径.jpg",
        wrong: "错误结果图片路径.jpg"
    };

    function checkAnswer(choice) {
        if (choice === 'C') {
            quizImg.src = images.correct;
            message.innerText = "🎊 正确！C店最便宜 (3,700円)！";
            message.style.color = "#32cd32";
        } else {
            quizImg.src = images.wrong;
            message.innerText = "❌ 不对哦，再仔细算算看？";
            message.style.color = "#ff4500";
        }
        retryBtn.style.display = "inline-block";
    }

    function resetGame() {
        quizImg.src = images.question;
        message.innerText = "";
        retryBtn.style.display = "none";
    }
</script>

</body>
</html>
